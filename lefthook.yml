pre-commit:
  parallel: true
  commands:
    actionlint:
      run: mise run actionlint
      glob: '.github/workflows/*.{yml,yaml}'
    web-linter:
      run: |
        bunx --bun eslint --fix {staged_files} \
          && git add {staged_files}
      root: web/
      glob: '*.{ts,tsx,js,jsx}'
    cpp-formatter:
      run: |
        clang-format -i {staged_files} \
          && git add {staged_files}
      glob: '*.{c,cc,cxx,cpp,h,hh,hpp,hxx}'
    misc-linter:
      run: |
        bunx --bun prettier --write {staged_files} \
          && git add {staged_files}
      glob: '*.{md,json,yml,yaml}'
    nix-linter:
      run: |
        alejandra -q {staged_files} \
          && git add {staged_files}
      glob: '*.{nix}'
